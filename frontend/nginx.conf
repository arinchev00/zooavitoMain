server {
    listen 80;
    server_name localhost;
    client_max_body_size 50M;  # Или даже 100M  # 👈 ГЛОБАЛЬНЫЙ ЛИМИТ
    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Явная обработка статических файлов
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Обработка статических файлов React (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Проксирование API запросов на бэкенд
    location /api/ {
        client_max_body_size 50M;  # Или даже 100M  # 👈 ДЛЯ API ТОЖЕ ВАЖНО
        rewrite ^/api/(.*) /v1/api/$1 break;
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Дополнительные таймауты для больших файлов
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}